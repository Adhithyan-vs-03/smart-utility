<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #1e3a8a);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card{
    width:100%;
    max-width:360px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(12px);
    border-radius:18px;
    padding:24px;
    color:#fff;
}

h2{text-align:center;margin-bottom:14px;}

input{
    width:90%;
    margin-left: 15px;
    padding:12px;
    border-radius:14px;
    border:none;
    background:rgba(255,255,255,.15);
    color:#fff;
    font-size:1.3rem;
    text-align:center;
    letter-spacing:6px;
}

button{
    margin-top:18px;
    margin-left: 100px;
    width:40%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:#fff;
    font-size:1rem;
}

.alert{
    background:#7f1d1d;
    padding:10px;
    border-radius:10px;
    font-size:.9rem;
    margin-bottom:12px;
}
</style>
</head>

<body>

<div class="card">
    <h2>OTP Verification</h2>

    {% for message in messages %}
        <div class="alert">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" maxlength="6" placeholder="••••••" required>
        <button type="submit">Verify OTP</button>
    </form>
</div>

</body>
</html>
