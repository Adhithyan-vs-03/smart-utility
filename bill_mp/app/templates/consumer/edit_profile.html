{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Profile | Smart Utility</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    margin:0;
    color:#1e293b;
}
.navbar{
    background:#111827;
    color:#fff;
    padding:1rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.navbar a{
    color:#fff;
    text-decoration:none;
    margin-left:1.5rem;
    font-weight:500;
}
.container{
    max-width:1200px;
    margin:2rem auto;
    padding:1rem;
    display:grid;
    grid-template-columns:300px 1fr;
    gap:2rem;
}
.sidebar{
    background:#111827;
    border-radius:16px;
    padding:2rem;
    color:#fff;
}
.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#4f46e5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
    font-weight:700;
    margin:auto;
}
.sidebar h2{
    text-align:center;
    margin-top:1rem;
}
.sidebar p{
    text-align:center;
    opacity:.7;
}
.menu a{
    display:block;
    padding:.9rem;
    border-radius:10px;
    margin-top:.5rem;
    color:#cbd5f5;
    text-decoration:none;
}
.menu a:hover,
.menu a.active{
    background:#4f46e5;
    color:#fff;
}
.content{
    background:#fff;
    border-radius:18px;
    padding:2.5rem;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e5e7eb;
    padding-bottom:1.5rem;
}
.header h1{
    margin:0;
}
.edit-btn{
    background:#eef2ff;
    color:#4f46e5;
    border:none;
    padding:.7rem 1.4rem;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}
.edit-btn:hover{
    background:#4f46e5;
    color:#fff;
}
.form-grid{
    margin-top:2rem;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.5rem;
}
.form-group{
    display:flex;
    flex-direction:column;
}
.form-group label{
    font-weight:600;
    margin-bottom:.4rem;
}
.form-control{
    padding:.8rem;
    border-radius:10px;
    border:1px solid #cbd5e1;
    background:#f8fafc;
}
.form-control:focus{
    outline:none;
    border-color:#4f46e5;
    background:#fff;
}
.form-control[readonly]{
    background:#f1f5f9;
}
.actions{
    margin-top:2.5rem;
    display:flex;
    gap:1rem;
}
.btn{
    padding:.8rem 2rem;
    border-radius:10px;
    border:none;
    font-weight:600;
    cursor:pointer;
}
.btn-primary{
    background:#4f46e5;
    color:#fff;
}
.btn-secondary{
    background:#e5e7eb;
}
.badge{
    display:inline-block;
    background:#dcfce7;
    color:#15803d;
    padding:.25rem .75rem;
    border-radius:999px;
    font-size:.8rem;
}
@media(max-width:900px){
    .container{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <strong><i class="fas fa-bolt"></i> Smart Utility</strong>
    <div>
        <a href="{% url 'customer_dashboard' %}">Dashboard</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'customer_login' %}">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="avatar">{{ user.first_name|first|upper }}</div>
    <h2>{{ user.first_name }}</h2>
    <p>{{ user.email }}</p>
    <p><span class="badge">Active Customer</span></p>

    <div class="menu">
        <a class="active"><i class="fas fa-user"></i> Profile</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<form method="POST">
{% csrf_token %}

<div class="header">
    <h1>Profile Information</h1>
    <button type="button" class="edit-btn" onclick="enableEdit()">
        <i class="fas fa-edit"></i> Edit
    </button>
</div>

<div class="form-grid">

    <div class="form-group">
        <label>Full Name</label>
        <input class="form-control editable" name="name"
               value="{{ user.first_name }}" readonly>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input class="form-control editable" name="email"
               value="{{ user.email }}" readonly>
    </div>

    <div class="form-group">
        <label>Phone</label>
        <input class="form-control editable" name="phone"
               value="{{ user.phone }}" readonly>
    </div>

    <div class="form-group">
        <label>Customer ID</label>
        <input class="form-control" value="{{ customer.customer_id }}" readonly>
    </div>

    <div class="form-group" style="grid-column:1/3">
        <label>Address</label>
        <textarea class="form-control editable"
                  name="address" rows="3" readonly>{{ customer.address }}</textarea>
    </div>

</div>
<div class="form-group">
    <label>Connection Type</label>
    <select name="connection_type" class="form-control editable" readonly>
        <option value="ELECTRICITY" {% if customer.connection_type == "ELECTRICITY" %}selected{% endif %}>Electricity</option>
        <option value="WATER" {% if customer.connection_type == "WATER" %}selected{% endif %}>Water</option>
        <option value="GAS" {% if customer.connection_type == "GAS" %}selected{% endif %}>Gas</option>
    </select>
</div>

<div class="actions">
    <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> Save Changes
    </button>
    <button type="button" class="btn btn-secondary" onclick="location.reload()">
        Cancel
    </button>
</div>

</form>
</div>
</div>

<script>
function enableEdit(){
    document.querySelectorAll('.editable').forEach(el=>{
        el.removeAttribute('readonly');
        el.removeAttribute('disabled');
    });
}

</script>

</body>
</html>
