<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #1e3a8a);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 30px 25px;
    color: #e5e7eb;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.login-card h2 {
    text-align: center;
    margin-bottom: 8px;
    font-size: 26px;
}

.login-card p {
    text-align: center;
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 20px;
}

/* Messages */
.alert {
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 15px;
    text-align: center;
}

.alert.error {
    background: rgba(239, 68, 68, 0.2);
    color: #fecaca;
    border: 1px solid rgba(239, 68, 68, 0.4);
}

.alert.success {
    background: rgba(34, 197, 94, 0.2);
    color: #bbf7d0;
    border: 1px solid rgba(34, 197, 94, 0.4);
}

/* Form */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-size: 13px;
    color: #cbd5f5;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 15px;
}

.form-group input::placeholder {
    color: #9ca3af;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #22d3ee, #2563eb);
    color: #020617;
    font-weight: 600;
    cursor: pointer;
}
.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(59,130,246,0.4);
}

/* Links */
.links {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
}

.links a {
    color:  #38bdf8;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
    .login-card {
        padding: 22px 18px;
    }

    .login-card h2 {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<div class="login-card">
    <h2>Customer Login</h2>
    <p>Login using Email or Phone Number</p>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Email or Phone</label>
            <input type="text" name="email" placeholder="Enter email or phone" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <a href="{% url 'customer_dashboard' %}">
        <button type="submit" class="login-btn">Login</button></a>
    </form>

    <div class="links">
        <a href="{% url 'forgot_password' %}">Forgot Password?</a><br><br>
        <span>New user? <a href="{% url 'register' %}">Register here</a></span>
    </div>
</div>

</body>
</html>
