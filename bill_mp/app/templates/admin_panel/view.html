<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Consumer Details | Admin</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">
            <i class="fas fa-user"></i> Consumer Details
        </h3>
        <a href="{% url 'admin_user_management' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- BASIC INFO -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <i class="fas fa-id-card"></i> Personal Information
        </div>
        <div class="card-body row g-3">

            <div class="col-md-6">
                <label class="form-label fw-semibold">Consumer ID</label>
                <input class="form-control" value="{{ customer.customer_id }}" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Full Name</label>
                <input class="form-control" value="{{ user_obj.first_name }}" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input class="form-control" value="{{ user_obj.email }}" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Phone</label>
                <input class="form-control" value="{{ user_obj.phone }}" readonly>
            </div>

            <div class="col-md-12">
                <label class="form-label fw-semibold">Address</label>
                <textarea class="form-control" rows="2" readonly>{{ customer.address }}</textarea>
            </div>

        </div>
    </div>

    <!-- CONNECTION INFO -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-success text-white">
            <i class="fas fa-plug"></i> Utility Connection
        </div>
        <div class="card-body row g-3">

            <div class="col-md-6">
                <label class="form-label fw-semibold">Service Type</label>
                <input class="form-control" value="{{ customer.connection_type }}" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Meter Number</label>
                <input class="form-control" value="MTR-{{ customer.customer_id }}" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Account Status</label>
                <span class="badge {% if user_obj.is_active %}bg-success{% else %}bg-danger{% endif %}">
                    {% if user_obj.is_active %}Active{% else %}Inactive{% endif %}
                </span>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Joined On</label>
                <input class="form-control" value="{{ user_obj.date_joined|date:'d M Y' }}" readonly>
            </div>

        </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="d-flex justify-content-end gap-2">
        <a href="{% url 'ad_edit_consumer' customer.customer_id %}" class="btn btn-primary">
            <i class="fas fa-edit"></i> Edit Consumer
        </a>
        <a href="" class="btn btn-outline-dark">
            <i class="fas fa-file-invoice"></i> Billing History
        </a>
    </div>

</div>

</body>
</html>
